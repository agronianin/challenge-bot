challenge:
  bot:
    token: ${BOT_TOKEN:}
    username: ${BOT_USERNAME:challenge_bot}
    timezone: ${TIMEZONE:Europe/Moscow}
    post-time: ${POST_TIME:08:00}
    exercises-per-day: ${EXERCISES_PER_DAY:3}
    types-per-day: ${TYPES_PER_DAY:2}
    reps-growth-percent: ${REPS_GROWTH_PERCENT:0.05}
    reps-round-mode: ${REPS_ROUND_MODE:ceil}
  localization:
    default-locale: ru

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/challenge}
    username: ${DB_USER:challenge}
    password: ${DB_PASSWORD:challenge}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

logging:
  file:
    path: ${LOG_DIR:./logs}
