services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-challenge}
      POSTGRES_USER: ${DB_USER:-challenge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-challenge}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-challenge} -d ${DB_NAME:-challenge}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DATABASE_URL: "jdbc:postgresql://postgres:5432/challenge"
      LOG_DIR: "/app/logs"
    volumes:
      - ./logs:/app/logs

  migrate:
    image: liquibase/liquibase:4.32
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    working_dir: /workspace
    volumes:
      - .:/workspace
    command:
      - --url=jdbc:postgresql://postgres:5432/challenge
      - --username=${DB_USER:-challenge}
      - --password=${DB_PASSWORD:-challenge}
      - --changeLogFile=db/liquibase/changelog.xml
      - update

volumes:
  pgdata:
